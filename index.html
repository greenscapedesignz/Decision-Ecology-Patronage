<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Patronage Intelligence — Stakeholder Intelligence System</title>
<style>
/* ── VARIABLES ───────────────────────────────────────── */
:root{
  --bg:#060e09;--surf:#0c1a10;--card:#101f13;--bdr:#1e3523;
  --p500:#2e5c4a;--p400:#4f7f70;--p300:#76a786;--p200:#a8c9b4;--p100:#d4e8dc;
  --amber:#c67a2b;--amblt:#e8a44a;--warn:#7a2020;
  --tx:#e8f0ec;--mu:#7a9a87;--dim:#4a6054;
  --ff:Georgia,'Times New Roman',serif;
  --fm:'Courier New',Courier,monospace;
}
/* ── RESET ───────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:var(--ff);font-size:16px;line-height:1.6;overflow-x:hidden}
button{font-family:var(--ff);cursor:pointer}
input,textarea,select{font-family:var(--ff)}
/* ── LAYOUT ──────────────────────────────────────────── */
#app{min-height:100vh;position:relative}
#app::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 20% 20%,rgba(46,92,74,.1) 0%,transparent 60%),radial-gradient(ellipse 60% 80% at 80% 80%,rgba(15,32,24,.15) 0%,transparent 60%);pointer-events:none;z-index:0}
#app::after{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(46,92,74,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(46,92,74,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
.scr{position:relative;z-index:1;min-height:100vh}
.cx{max-width:960px;margin:0 auto;padding:0 24px}
.cx-sm{max-width:640px;margin:0 auto;padding:0 24px}
.cx-lg{max-width:1200px;margin:0 auto;padding:0 24px}
/* ── TYPOGRAPHY ──────────────────────────────────────── */
.display{font-family:var(--ff);font-weight:700;line-height:1.1;letter-spacing:-.02em}
.mono{font-family:var(--fm);letter-spacing:.05em}
.label{font-family:var(--fm);font-size:10px;letter-spacing:.1em;color:var(--mu)}
/* ── BUTTONS ─────────────────────────────────────────── */
.btn{display:inline-block;border:none;border-radius:3px;font-size:15px;font-family:var(--ff);transition:all .2s;text-decoration:none}
.btn-primary{background:var(--p500);color:var(--p100);padding:14px 32px;box-shadow:0 0 0 1px rgba(118,167,134,.3),0 4px 20px rgba(46,92,74,.25)}
.btn-primary:hover{opacity:.9;transform:translateY(-1px)}
.btn-ghost{background:transparent;color:var(--mu);padding:12px 20px;border:1px solid var(--bdr)}
.btn-ghost:hover{border-color:var(--p400);color:var(--p200)}
.btn-sm{padding:10px 20px;font-size:13px;font-family:var(--fm)}
/* ── CARDS ───────────────────────────────────────────── */
.card{background:var(--card);border:1px solid var(--bdr);border-radius:4px;padding:24px;transition:border-color .2s,transform .2s}
.card-hover:hover{border-color:var(--p400);transform:translateY(-2px)}
/* ── FORM ELEMENTS ───────────────────────────────────── */
.q-block{background:var(--card);border:1px solid var(--bdr);border-radius:4px;padding:20px;margin-bottom:16px}
.q-label{font-size:14px;color:var(--mu);margin-bottom:12px;display:block;line-height:1.5}
.opt-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:9px;cursor:pointer}
.opt-radio{width:16px;height:16px;border-radius:50%;border:1.5px solid var(--p400);background:transparent;flex-shrink:0;margin-top:2px;transition:all .15s;cursor:pointer}
.opt-radio.active{background:var(--p300);border-color:var(--p300);box-shadow:inset 0 0 0 3px var(--card)}
.opt-check{width:16px;height:16px;border-radius:3px;border:1.5px solid var(--p400);background:transparent;flex-shrink:0;margin-top:2px;transition:all .15s;cursor:pointer}
.opt-check.active{background:var(--p300);border-color:var(--p300)}
.opt-check.active::after{content:'✓';display:block;text-align:center;font-size:10px;line-height:16px;color:var(--card)}
.opt-label{font-size:14px;color:var(--mu);transition:color .15s;line-height:1.5}
.opt-label.active{color:var(--p200)}
textarea.q-ta{width:100%;min-height:90px;padding:12px 14px;background:rgba(10,20,14,.8);border:1px solid var(--bdr);border-radius:4px;color:var(--tx);font-family:var(--ff);font-size:14px;resize:vertical;outline:none;line-height:1.6;transition:border-color .2s}
textarea.q-ta:focus{border-color:var(--p400)}
textarea.q-ta::placeholder{color:var(--dim)}
.range-wrap{margin-top:4px}
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:3px;background:var(--bdr);border-radius:2px;outline:none;cursor:pointer;accent-color:var(--p300)}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--p300);border:2px solid var(--p400);cursor:pointer}
.range-labels{display:flex;justify-content:space-between;margin-top:8px;gap:16px}
.range-label{font-size:11px;color:var(--dim);font-family:var(--ff);max-width:45%}
.range-val{font-family:var(--fm);font-size:12px;color:var(--p300);flex-shrink:0}
/* ── SIGNAL TAGS ─────────────────────────────────────── */
.sig-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.sig{display:inline-flex;align-items:center;gap:4px;font-family:var(--fm);font-size:10px;padding:3px 9px;border-radius:3px;animation:fadein .3s ease}
.sig-amber{background:rgba(198,122,43,.12);border:1px solid rgba(198,122,43,.3);color:var(--amblt)}
.sig-green{background:rgba(46,92,74,.2);border:1px solid rgba(118,167,134,.4);color:var(--p200)}
.sig-warn{background:rgba(122,32,32,.2);border:1px solid rgba(198,80,80,.3);color:#e89a9a}
/* ── PROGRESS BAR ────────────────────────────────────── */
.prog-wrap{display:flex;gap:6px;align-items:center}
.prog-seg{height:3px;border-radius:2px;width:28px;transition:background .3s}
.prog-done{background:var(--p400)}
.prog-todo{background:var(--bdr)}
/* ── PROCESSING ──────────────────────────────────────── */
.spinner{width:64px;height:64px;border:2px solid var(--bdr);border-top:2px solid var(--p300);border-radius:50%;animation:spin 1.2s linear infinite}
.proc-bar{height:2px;background:var(--bdr);border-radius:1px;overflow:hidden}
.proc-fill{height:100%;background:var(--p300);border-radius:1px;transition:width .6s ease}
/* ── PERSONA CARD ────────────────────────────────────── */
.dim-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.dim-card{background:rgba(10,20,14,.9);border:1px solid var(--bdr);border-radius:6px;padding:16px;transition:border-color .2s}
.dim-card:hover{border-color:var(--p400)}
.dim-model{font-family:var(--fm);font-size:9px;color:var(--p400);margin-bottom:3px;letter-spacing:.08em}
.dim-name{font-family:var(--fm);font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.07em;margin-bottom:7px}
.dim-val{font-size:14px;font-weight:600;color:var(--p100);line-height:1.4;margin-bottom:6px}
.dim-insight{font-size:12px;color:var(--mu);line-height:1.5}
.panel{background:var(--card);border:1px solid var(--bdr);border-radius:6px;padding:24px}
.panel-title{font-family:var(--fm);font-size:10px;color:var(--p400);margin-bottom:14px;letter-spacing:.08em}
.panel-sub{font-family:var(--fm);font-size:9px;color:var(--dim);margin-bottom:6px;letter-spacing:.06em}
.flag-row{display:flex;gap:10px;margin-bottom:10px}
.flag-icon{flex-shrink:0;margin-top:2px}
.flag-txt{font-size:13px;color:var(--mu);line-height:1.5}
.panel-risk{background:rgba(122,32,32,.08);border:1px solid rgba(198,80,80,.15)}
.panel-risk .panel-title{color:#e89a9a}
.panel-green{background:rgba(46,92,74,.1);border:1px solid rgba(79,127,112,.2)}
.panel-green .panel-title{color:var(--p300)}
.divider{height:1px;background:var(--bdr);margin:16px 0}
/* ── MODAL ───────────────────────────────────────────── */
.modal-bg{position:fixed;inset:0;background:rgba(6,14,9,.92);z-index:100;display:flex;align-items:center;justify-content:center;padding:24px}
.modal-box{background:var(--surf);border:1px solid var(--bdr);border-radius:6px;padding:32px;max-width:480px;width:100%}
.modal-input{width:100%;padding:12px 14px;background:var(--card);border:1px solid var(--bdr);color:var(--tx);font-family:var(--fm);font-size:12px;border-radius:3px;outline:none}
/* ── TOAST ───────────────────────────────────────────── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(122,32,32,.95);border:1px solid rgba(198,80,80,.3);color:#fbb;padding:14px 20px;border-radius:4px;z-index:200;font-size:13px;max-width:520px;text-align:center;animation:fadein .3s ease}
/* ── ANIMATIONS ──────────────────────────────────────── */
@keyframes fadein{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.fade{animation:fadein .5s ease}
/* ── UTILS ───────────────────────────────────────────── */
.flex{display:flex}.flex-col{flex-direction:column}.items-center{align-items:center}
.justify-center{justify-content:center}.justify-between{justify-content:space-between}
.gap-2{gap:8px}.gap-3{gap:12px}.gap-4{gap:16px}
.wrap{flex-wrap:wrap}.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.mt-1{margin-top:4px}.mt-2{margin-top:8px}.mt-3{margin-top:12px}.mt-4{margin-top:16px}
.mt-6{margin-top:24px}.mt-8{margin-top:32px}.mt-10{margin-top:40px}.mt-12{margin-top:48px}
.mb-1{margin-bottom:4px}.mb-2{margin-bottom:8px}.mb-3{margin-bottom:12px}
.mb-4{margin-bottom:16px}.mb-6{margin-bottom:24px}.mb-8{margin-bottom:32px}
.text-right{text-align:right}
@media(max-width:640px){.grid-2{grid-template-columns:1fr}.cx,.cx-sm,.cx-lg{padding:0 16px}}
/* ── PRINT ───────────────────────────────────────────── */
@media print{#app::before,#app::after{display:none}.no-print{display:none!important}.dim-card,.panel{break-inside:avoid}}
</style>
</head>

<script>

/* ════════════════════════════════════════════════════════
   EVENT HANDLERS (direct DOM, no re-render)
════════════════════════════════════════════════════════ */
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function setRadio(id,val,row){
  state.answers[id]=val;
  // Update visual without re-render
  const block=row.closest('.q-block');
  block.querySelectorAll('.opt-radio').forEach(r=>r.classList.remove('active'));
  block.querySelectorAll('.opt-label').forEach(l=>l.classList.remove('active'));
  row.querySelector('.opt-radio').classList.add('active');
  row.querySelector('.opt-label').classList.add('active');
  updateCanNext();
}

function toggleMulti(id,val,row){
  const cur=state.answers[id]||[];
  state.answers[id]=cur.includes(val)?cur.filter(v=>v!==val):[...cur,val];
  const chk=row.querySelector('.opt-check');
  const lbl=row.querySelector('.opt-label');
  const isNow=state.answers[id].includes(val);
  chk.classList.toggle('active',isNow);
  chk.textContent=isNow?'✓':'';
  lbl.classList.toggle('active',isNow);
  updateCanNext();
}

function handleText(id,val){
  state.answers[id]=val;
  const sigs=detectSignals(val);
  const sigContainer=document.getElementById('sigs-'+id);
  if(sigContainer){
    sigContainer.innerHTML=sigs.length>0?`<div class="sig-wrap">${sigs.map(sigTag).join('')}</div>`:'';
  }
  // Merge into allSignals
  sigs.forEach(s=>{if(!state.allSignals.find(x=>x.l===s.l))state.allSignals.push(s);});
  updateCanNext();
}

function handleSlider(id,val){
  state.answers[id]=Number(val);
  const el=document.getElementById('sv-'+id);
  if(el)el.textContent=val;
}

function handleAlloc(id,dim,val){
  if(!state.answers[id])state.answers[id]={};
  state.answers[id][dim]=Number(val);
  // Update display for this dim
  const dimKey=id+'-'+dim;
  const avEl=document.getElementById('av-'+dimKey);
  if(avEl)avEl.textContent=val+' pts';
  // Update remaining
  const q=findAllocQ(id);
  if(q){
    const total=q.dims.reduce((s,d)=>s+(state.answers[id][d]||0),0);
    const rem=100-total;
    const remEl=document.getElementById('rem-'+id);
    if(remEl){
      remEl.textContent=rem===0?'✓ 100 points allocated':`${rem} points remaining`;
      remEl.style.color=rem===0?'var(--p300)':rem<0?'#e89a9a':'var(--dim)';
    }
  }
}

function findAllocQ(id){
  const secs=QS[state.type]||[];
  for(const sec of secs)for(const q of sec.qs)if(q.id===id&&q.t==='alloc')return q;
  return null;
}

function updateCanNext(){
  const secs=QS[state.type]||[];
  const sec=secs[state.secIdx];
  if(!sec)return;
  const can=sec.qs.every(q=>q.t==='alloc'||q.t==='slider'||(state.answers[q.id]!==undefined&&state.answers[q.id]!==''));
  const btn=document.querySelector('.scr .btn-primary,.scr .btn-ghost');
  if(!btn)return;
  // find the next/submit button (last button in .scr)
  const btns=document.querySelectorAll('.scr button');
  if(btns.length<1)return;
  const last=btns[btns.length-1];
  last.style.opacity=can?'1':'0.5';
  last.style.cursor=can?'pointer':'not-allowed';
}

function navBack(){
  if(state.secIdx>0)setState({secIdx:state.secIdx-1});
  else setState({screen:'stakeholder'});
}

function nextSection(){
  const secs=QS[state.type]||[];
  const sec=secs[state.secIdx];
  const can=sec.qs.every(q=>q.t==='alloc'||q.t==='slider'||(state.answers[q.id]!==undefined&&state.answers[q.id]!==''));
  if(!can)return;
  setState({secIdx:state.secIdx+1});
}

function saveApiKey(){
  const inp=document.getElementById('api-key-input');
  if(inp){safeLSSet('pat_key',inp.value);state.apiKey=inp.value;}
  setState({showSettings:false});
}

/* ════════════════════════════════════════════════════════
   FORM SUBMIT + API
════════════════════════════════════════════════════════ */
async function submitForm(){
  const secs=QS[state.type]||[];
  const sec=secs[state.secIdx];
  const can=sec.qs.every(q=>q.t==='alloc'||q.t==='slider'||(state.answers[q.id]!==undefined&&state.answers[q.id]!==''));
  if(!can)return;
  setState({screen:'processing',procStage:0,error:null});
  startProcAnimation();
  try{
    const [persona]=await Promise.all([
      callClaude(),
      new Promise(r=>setTimeout(r,5000))
    ]);
    setState({persona,screen:'persona'});
  }catch(e){
    setState({screen:'questions',error:e.message});
  }
}

let procTimer=null;
function startProcAnimation(){
  let i=0;
  if(procTimer)clearInterval(procTimer);
  procTimer=setInterval(()=>{
    i=Math.min(i+1,PROC_STAGES.length-1);
    const el=document.getElementById('proc-stage');
    const fill=document.getElementById('proc-fill');
    if(el)el.textContent=PROC_STAGES[i];
    if(fill)fill.style.width=Math.round(((i+1)/PROC_STAGES.length)*100)+'%';
    if(i===PROC_STAGES.length-1)clearInterval(procTimer);
  },600);
}

function buildPrompt(){
  const arch=ARCH[state.type];
  const sigStr=state.allSignals.map(s=>`• ${s.l}: ${s.i} → ${s.s}`).join('\n')||'No explicit signals from text.';
  const ansStr=Object.entries(state.answers).map(([k,v])=>{
    if(typeof v==='object'&&!Array.isArray(v))return`${k}: ${Object.entries(v).map(([d,pts])=>`${d}=${pts}pts`).join(', ')}`;
    return`${k}: ${Array.isArray(v)?v.join(', '):v}`;
  }).join('\n');
  return`You are Patronage Intelligence — a strategic stakeholder intelligence engine for Greenscape Designz, a premium landscape architecture practice in Bengaluru.

STAKEHOLDER TYPE: ${arch.l}
${arch.d}

INTAKE RESPONSES:
${ansStr}

DETECTED SIGNALS:
${sigStr}

Generate a Strategic Persona Card as ONLY valid JSON with these exact fields:
{
  "primaryMotivation": "One precise sentence about the core driver behind this engagement",
  "hiddenFear": "The unspoken fear that governs their most significant decisions",
  "fantasyState": "The idealised outcome they privately imagine but rarely articulate",
  "storyArc": "One sentence: the personal or organisational chapter this project represents",
  "discStyle": "One of: D — Dominance / I — Influence / S — Steadiness / C — Conscientiousness",
  "discInsight": "How to adapt every meeting, proposal, and communication to this style",
  "maslowLevel": "One of: Safety-Functional / Belonging-Social / Esteem-Prestige / Self-Actualisation",
  "maslowInsight": "What proposal language and register this level requires",
  "buyerReadiness": "Stage 1–6 label with 1-sentence note",
  "vMeme": "One of: Red / Blue / Orange / Green / Yellow / Turquoise",
  "vMemeInsight": "What this means for ecological positioning and communication",
  "trustDeficit": "Which trust dimension [Technical/Emotional/Strategic/Operational/Social/Identity] is most underdeveloped and why",
  "primaryBias": "The dominant cognitive bias active in this client",
  "biasStrategy": "How to reframe the proposal to work with this bias",
  "strategicRecommendation": "Primary engagement and proposal strategy in 2–3 clear sentences",
  "proposalFormat": "One of: Narrative-first / Data-first / Visual-first / Systems-first — and why",
  "communicationProtocol": "How to structure every meeting and communication with this stakeholder",
  "kanoDelighter": "The specific unexpected Excitement Need to deploy at engagement start",
  "feeStrategy": "Reference point architecture and conversation sequence for the fee discussion",
  "cialdiniPrinciple": "Primary Cialdini influence principle to activate — and how",
  "riskFlags": ["Up to 4 specific actionable risk warnings"],
  "greenFlags": ["Up to 4 specific positive alignment signals"],
  "meetingPrep": "What to research and observe in the 20 minutes before the first meeting",
  "adaptivePositioning": "How to position Greenscape Designz specifically for this profile"
}

Respond with ONLY the JSON object, no other text.`;
}

async function callClaude(){
  const headers={"Content-Type":"application/json","anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"};
  if(state.apiKey)headers["x-api-key"]=state.apiKey;
  const res=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",headers,
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:2000,messages:[{role:"user",content:buildPrompt()}]})
  });
  if(!res.ok){const e=await res.json();throw new Error(e.error?.message||`API error ${res.status}`);}
  const data=await res.json();
  const text=data.content?.[0]?.text||"";
  const clean=text.replace(/```json|```/g,"").trim();
  try{return JSON.parse(clean);}catch{throw new Error("Could not parse intelligence response. Please retry.");}
}
